name: Package SmithTool

on:
  workflow_dispatch:
  push:
    branches:
      - "main"
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  windows-installer:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSYS2 Qt Toolchain
        uses: msys2/setup-msys2@v2
        id: msys2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-qt6-base
            mingw-w64-x86_64-qt6-tools
            mingw-w64-x86_64-qt6-declarative
            mingw-w64-x86_64-qt6-svg

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Build and Deploy Release Payload
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $msys2Root = "${{ steps.msys2.outputs.msys2-location }}"
          if ([string]::IsNullOrWhiteSpace($msys2Root)) {
            $msys2Root = "C:\msys64"
          }
          $qtRoot = Join-Path $msys2Root "mingw64"
          $qtConfig = "$qtRoot\lib\cmake\Qt6\Qt6Config.cmake"
          $buildDir = "build-release"
          $deployDir = "deploy\release"
          if (!(Test-Path $qtConfig)) {
            throw "Qt6Config.cmake not found at $qtConfig"
          }
          $env:Path = "$qtRoot\bin;$msys2Root\usr\bin;$env:Path"
          cmake -S . -B $buildDir -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_PREFIX_PATH="$qtRoot" `
            -DCMAKE_C_COMPILER="$qtRoot\bin\gcc.exe" `
            -DCMAKE_CXX_COMPILER="$qtRoot\bin\g++.exe"
          cmake --build $buildDir --config Release --parallel 2
          New-Item -ItemType Directory -Path $deployDir -Force | Out-Null
          Copy-Item "$buildDir\SmithTool.exe" "$deployDir\SmithTool.exe" -Force
          $windeploy = @("$qtRoot\bin\windeployqt6.exe", "$qtRoot\bin\windeployqt.exe") | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (!$windeploy) {
            throw "windeployqt tool not found under $qtRoot\\bin"
          }
          & $windeploy --release --no-translations "$deployDir\SmithTool.exe"

          # Ensure MinGW runtime DLLs are bundled so end-users do not need Qt/MSYS2 installed.
          $runtimeDllCandidates = @(
            "libb2-1.dll",
            "libbrotlicommon.dll",
            "libbrotlidec.dll",
            "libbz2-1.dll",
            "libdouble-conversion.dll",
            "libfreetype-6.dll",
            "libgcc_s_seh-1.dll",
            "libglib-2.0-0.dll",
            "libgraphite2.dll",
            "libharfbuzz-0.dll",
            "libiconv-2.dll",
            "libintl-8.dll",
            "libmd4c.dll",
            "libpcre2-16-0.dll",
            "libpcre2-8-0.dll",
            "libpng16-16.dll",
            "libstdc++-6.dll",
            "libwinpthread-1.dll",
            "libzstd.dll",
            "zlib1.dll"
          )
          foreach ($dll in $runtimeDllCandidates) {
            $src = Join-Path "$qtRoot\bin" $dll
            $dst = Join-Path $deployDir $dll
            if ((Test-Path $src) -and !(Test-Path $dst)) {
              Copy-Item $src $dst -Force
            }
          }

          # Copy versioned runtime DLLs that vary across MSYS2/Qt updates.
          foreach ($pattern in @("libicu*.dll", "libjpeg-*.dll", "libgio-2.0-0.dll", "libgobject-2.0-0.dll")) {
            Get-ChildItem "$qtRoot\bin" -Filter $pattern -File -ErrorAction SilentlyContinue | ForEach-Object {
              $dst = Join-Path $deployDir $_.Name
              if (!(Test-Path $dst)) {
                Copy-Item $_.FullName $dst -Force
              }
            }
          }

          # Resolve any remaining non-system missing DLLs by scanning import tables recursively.
          $objdump = Join-Path "$qtRoot\bin" "objdump.exe"
          if (!(Test-Path $objdump)) {
            throw "objdump.exe not found at $objdump"
          }
          function Get-ImportedDllNames([string]$binaryPath) {
            $lines = & $objdump -p $binaryPath 2>$null
            $dlls = @()
            foreach ($line in $lines) {
              if ($line -match "DLL Name:\\s*(.+)$") {
                $dlls += $Matches[1].Trim()
              }
            }
            return $dlls | Sort-Object -Unique
          }
          for ($iter = 0; $iter -lt 6; $iter++) {
            $deployFiles = Get-ChildItem $deployDir -Recurse -File | Where-Object { $_.Extension -in @(".exe", ".dll") }
            $present = @{}
            foreach ($f in $deployFiles) { $present[$f.Name.ToUpperInvariant()] = $true }
            $missing = New-Object System.Collections.Generic.List[string]
            foreach ($f in $deployFiles) {
              $imports = Get-ImportedDllNames $f.FullName
              foreach ($dll in $imports) {
                $up = $dll.ToUpperInvariant()
                if ($up.StartsWith("API-MS-WIN-") -or $up.StartsWith("EXT-MS-")) { continue }
                if ($present.ContainsKey($up)) { continue }
                if (Test-Path (Join-Path "$env:WINDIR\System32" $dll)) { continue }
                if (Test-Path (Join-Path "$env:WINDIR\SysWOW64" $dll)) { continue }
                if (-not $missing.Contains($dll)) { $missing.Add($dll) }
              }
            }
            if ($missing.Count -eq 0) { break }
            $copiedAny = $false
            foreach ($dll in $missing) {
              $src = Join-Path "$qtRoot\bin" $dll
              $dst = Join-Path $deployDir $dll
              if ((Test-Path $src) -and !(Test-Path $dst)) {
                Copy-Item $src $dst -Force
                $copiedAny = $true
              }
            }
            if (-not $copiedAny) { break }
          }

          $deployFiles = Get-ChildItem $deployDir -Recurse -File | Where-Object { $_.Extension -in @(".exe", ".dll") }
          $present = @{}
          foreach ($f in $deployFiles) { $present[$f.Name.ToUpperInvariant()] = $true }
          $unresolved = New-Object System.Collections.Generic.List[string]
          foreach ($f in $deployFiles) {
            $imports = Get-ImportedDllNames $f.FullName
            foreach ($dll in $imports) {
              $up = $dll.ToUpperInvariant()
              if ($up.StartsWith("API-MS-WIN-") -or $up.StartsWith("EXT-MS-")) { continue }
              if ($present.ContainsKey($up)) { continue }
              if (Test-Path (Join-Path "$env:WINDIR\System32" $dll)) { continue }
              if (Test-Path (Join-Path "$env:WINDIR\SysWOW64" $dll)) { continue }
              if (-not $unresolved.Contains($dll)) { $unresolved.Add($dll) }
            }
          }
          if ($unresolved.Count -gt 0) {
            throw ("Unresolved non-system runtime dependencies: " + (($unresolved | Sort-Object) -join ", "))
          }

          $requiredRuntime = @(
            "$deployDir\SmithTool.exe",
            "$deployDir\Qt6Core.dll",
            "$deployDir\Qt6Gui.dll",
            "$deployDir\Qt6Widgets.dll",
            "$deployDir\libgcc_s_seh-1.dll",
            "$deployDir\libstdc++-6.dll",
            "$deployDir\libwinpthread-1.dll",
            "$deployDir\platforms\qwindows.dll"
          )
          foreach ($file in $requiredRuntime) {
            if (!(Test-Path $file)) {
              throw "Missing runtime dependency: $file"
            }
          }
          if (@(Get-ChildItem $deployDir -Filter "libicuin*.dll" -File -ErrorAction SilentlyContinue).Count -eq 0) {
            throw "Missing ICU runtime dependency: libicuin*.dll"
          }
          if (@(Get-ChildItem $deployDir -Filter "libicuuc*.dll" -File -ErrorAction SilentlyContinue).Count -eq 0) {
            throw "Missing ICU runtime dependency: libicuuc*.dll"
          }

      - name: Build Windows Installer
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $isccCandidates = @(
            "C:\ProgramData\chocolatey\bin\iscc.exe",
            "C:\Program Files (x86)\Inno Setup 6\ISCC.exe",
            "C:\Program Files\Inno Setup 6\ISCC.exe",
            "$env:LOCALAPPDATA\Programs\Inno Setup 6\ISCC.exe"
          )
          $iscc = $isccCandidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (!$iscc) {
            $isccCmd = Get-Command iscc -ErrorAction SilentlyContinue
            if ($isccCmd) { $iscc = $isccCmd.Source }
          }
          if (!$iscc) {
            throw "ISCC executable not found after choco install innosetup."
          }
          if (!(Test-Path "deploy\release\SmithTool.exe")) {
            throw "deploy\\release\\SmithTool.exe is missing before installer build."
          }
          & $iscc "deploy\windows\smithtool.iss"

      - name: Pack Windows Portable Bundle
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path deploy\windows\installer -Force | Out-Null
          Compress-Archive `
            -Path deploy\release\* `
            -DestinationPath "deploy\windows\installer\SmithTool-${{ github.ref_name }}-windows-portable.zip" `
            -Force

      - name: Upload Windows Installer
        uses: actions/upload-artifact@v4
        with:
          name: smithtool-windows-installer
          path: |
            deploy/windows/installer/*.exe
            deploy/windows/installer/*.zip
          if-no-files-found: error

  debian-package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            qt6-base-dev \
            qt6-base-dev-tools \
            qt6-tools-dev-tools

      - name: Build Debian Package
        run: |
          chmod +x deploy/linux/build_deb.sh
          ./deploy/linux/build_deb.sh

      - name: Upload Debian Package
        uses: actions/upload-artifact@v4
        with:
          name: smithtool-debian-package
          path: deploy/linux/dist/*.deb
          if-no-files-found: error

  publish-release:
    needs:
      - windows-installer
      - debian-package
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: smithtool-*
          path: artifacts
          merge-multiple: true

      - name: Generate SHA256 Checksums
        run: |
          cd artifacts
          find . -type f ! -name "SHA256SUMS.txt" -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.exe
            artifacts/**/*.zip
            artifacts/**/*.deb
            artifacts/SHA256SUMS.txt
          generate_release_notes: true

  publish-nightly:
    needs:
      - windows-installer
      - debian-package
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update Nightly Tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f nightly "${GITHUB_SHA}"
          git push origin refs/tags/nightly --force

      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: smithtool-*
          path: artifacts
          merge-multiple: true

      - name: Generate SHA256 Checksums
        run: |
          cd artifacts
          find . -type f ! -name "SHA256SUMS.txt" -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS.txt

      - name: Create Nightly Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          target_commitish: ${{ github.sha }}
          name: Nightly
          prerelease: true
          make_latest: false
          files: |
            artifacts/**/*.exe
            artifacts/**/*.zip
            artifacts/**/*.deb
            artifacts/SHA256SUMS.txt
          body: |
            Automated rolling build from `main`.

            Commit: `${{ github.sha }}`
          generate_release_notes: false
