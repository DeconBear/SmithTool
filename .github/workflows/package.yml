name: Package SmithTool

on:
  workflow_dispatch:
  push:
    branches:
      - "main"
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  windows-installer:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSYS2 Qt Toolchain
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-qt6-base
            mingw-w64-x86_64-qt6-tools
            mingw-w64-x86_64-qt6-declarative
            mingw-w64-x86_64-qt6-svg

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Build and Deploy Release Payload
        shell: pwsh
        run: |
          $env:Path = "C:\msys64\mingw64\bin;C:\msys64\usr\bin;$env:Path"
          $env:CMAKE_PREFIX_PATH = "C:\msys64\mingw64"
          $env:BUILD_JOBS = "2"
          cmd /c "deploy\windows\build.bat"
          if (!(Test-Path "deploy\release\SmithTool.exe")) {
            throw "Build step finished but deploy/release/SmithTool.exe is missing."
          }

      - name: Build Windows Installer
        shell: pwsh
        run: |
          Push-Location "deploy\windows"
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "smithtool.iss"
          Pop-Location

      - name: Pack Windows Portable Bundle
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path deploy\windows\installer -Force | Out-Null
          Compress-Archive `
            -Path deploy\release\* `
            -DestinationPath "deploy\windows\installer\SmithTool-${{ github.ref_name }}-windows-portable.zip" `
            -Force

      - name: Upload Windows Installer
        uses: actions/upload-artifact@v4
        with:
          name: smithtool-windows-installer
          path: |
            deploy/windows/installer/*.exe
            deploy/windows/installer/*.zip
            deploy/release/**
          if-no-files-found: error

  debian-package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            qt6-base-dev \
            qt6-base-dev-tools \
            qt6-tools-dev-tools

      - name: Build Debian Package
        run: |
          chmod +x deploy/linux/build_deb.sh
          ./deploy/linux/build_deb.sh

      - name: Upload Debian Package
        uses: actions/upload-artifact@v4
        with:
          name: smithtool-debian-package
          path: deploy/linux/dist/*.deb
          if-no-files-found: error

  publish-release:
    needs:
      - windows-installer
      - debian-package
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: smithtool-*
          path: artifacts
          merge-multiple: true

      - name: Generate SHA256 Checksums
        run: |
          cd artifacts
          find . -type f ! -name "SHA256SUMS.txt" -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.exe
            artifacts/**/*.zip
            artifacts/**/*.deb
            artifacts/SHA256SUMS.txt
          generate_release_notes: true
